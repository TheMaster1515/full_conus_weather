<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>US Radar Wall - Live Only</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

#map {
  width: 100vw;
  height: 100vh;
}

.leaflet-control-attribution,
.leaflet-control-zoom {
  display: none;
}

#clock {
  position: fixed;
  bottom: 12px;
  left: 12px;
  color: white;
  font-family: monospace;
  font-size: 40px;
  background: rgba(0,0,0,0.6);
  padding: 10px 16px;
  border-radius: 8px;
  z-index: 2000;
}

#radar-updated {
  position: fixed;
  bottom: 80px;
  left: 12px;
  color: white;
  font-family: monospace;
  font-size: 18px;
  background: rgba(0,0,0,0.4);
  padding: 6px 10px;
  border-radius: 6px;
  z-index: 2000;
}
</style>
</head>

<body>
<div id="map"></div>
<div id="radar-updated"></div>
<div id="clock"></div>

<script>
const map = L.map("map", {
  center: [39.5, -98.35],
  zoom: 5,
  zoomControl: false,
  attributionControl: false
});

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  { maxZoom: 18 }
).addTo(map);

let radarLayer = null;
let lastRadarTime = null;

async function loadRadar() {
  try {
    const res = await fetch(
      "https://api.rainviewer.com/public/weather-maps.json",
      { cache: "no-store" }
    );

    const data = await res.json();
    const frames = [
      ...(data.radar.past || []),
      ...(data.radar.nowcast || [])
    ];

    if (!frames.length) return;

    const latest = frames[frames.length - 1];

    // Only update if a NEW frame exists
    if (latest.time !== lastRadarTime) {
      lastRadarTime = latest.time;

      if (radarLayer) map.removeLayer(radarLayer);

      radarLayer = L.tileLayer(
        `https://tilecache.rainviewer.com/v2/radar/${latest.time}/256/{z}/{x}/{y}/2/1_1.png`,
        {
          opacity: 0.4,
          zIndex: 1000,
          updateWhenIdle: false,
          updateWhenZooming: false
        }
      ).addTo(map);

      const frameDate = new Date(latest.time * 1000);

      document.getElementById("radar-updated").textContent =
        "Radar Frame: " +
        frameDate.toLocaleTimeString("en-US", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit"
        });
    }
  } catch (err) {
    console.error("Radar load failed:", err);
  }
}

// Initial load
loadRadar();

// 🔁 Refresh EVERY 5 MINUTES
setInterval(loadRadar, 5 * 60 * 1000);

// Clock
function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("en-US", {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit",
      timeZoneName: "short"
    });
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
