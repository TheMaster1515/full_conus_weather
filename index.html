<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>US Radar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
  }

  #map {
    width: 100vw;
    height: 100vh;
  }

  /* Hide Leaflet UI junk */
  .leaflet-control-attribution,
  .leaflet-control-zoom {
    display: none;
  }
</style>
</head>

<body>
<div id="map"></div>

<script>
  const map = L.map("map", {
    center: [39.5, -98.35], // Center of CONUS
    zoom: 5.7,
    zoomControl: false,
    attributionControl: false
  });

  // Dark base map (Weather Channel vibes)
  L.tileLayer(
    "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
    { maxZoom: 18 }
  ).addTo(map);

  let radarLayer = null;
  let radarFrames = [];
  let frameIndex = 0;

  async function loadRadar() {
    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data = await res.json();

    radarFrames = data.radar.past.concat(data.radar.nowcast || []);

    animateRadar();
  }

  function animateRadar() {
    if (radarLayer) map.removeLayer(radarLayer);

    const frame = radarFrames[frameIndex];

    radarLayer = L.tileLayer(
      `https://tilecache.rainviewer.com/v2/radar/${frame.time}/256/{z}/{x}/{y}/2/1_1.png`,
      {
        opacity: 0.75,
        zIndex: 1000
      }
    ).addTo(map);

    frameIndex = (frameIndex + 1) % radarFrames.length;
  }

  loadRadar();
  setInterval(animateRadar, 10000); // animation speed (ms)
</script>
</body>
</html>
