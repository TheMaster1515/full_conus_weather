<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NWS Radar Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #111;
  font-family: "Segoe UI", Tahoma, sans-serif;
}

#map {
  width: 100vw;
  height: 100vh;
}

.leaflet-control-attribution,
.leaflet-control-zoom {
  display: none;
}

#clock {
  position: fixed;
  bottom: 12px;
  left: 12px;
  z-index: 2200;
  color: #fff;
  background: rgba(0, 0, 0, 0.62);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 34px;
  font-family: monospace;
  pointer-events: none;
}

#radar-time {
  position: fixed;
  bottom: 74px;
  left: 12px;
  z-index: 2200;
  color: #f2f2f2;
  background: rgba(0, 0, 0, 0.45);
  border-radius: 6px;
  padding: 6px 10px;
  font-family: monospace;
  font-size: 15px;
  pointer-events: none;
}

#controls {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 2300;
  width: 300px;
  background: rgba(8, 12, 20, 0.86);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 10px;
  padding: 12px;
  color: #f6f8fc;
  backdrop-filter: blur(6px);
}

#controls .title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 8px;
}

#controls .row {
  margin-top: 10px;
}

#controls label {
  display: block;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.82);
  margin-bottom: 4px;
}

#controls input[type="range"] {
  width: 100%;
}

#controls button {
  width: 100%;
  margin-top: 8px;
  border: 1px solid rgba(255, 255, 255, 0.22);
  border-radius: 8px;
  padding: 8px 10px;
  background: rgba(255, 255, 255, 0.1);
  color: #fff;
  font-size: 13px;
  cursor: pointer;
}

#status {
  margin-top: 8px;
  min-height: 16px;
  font-size: 12px;
  color: #bdf7c5;
}

#hint {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2200;
  color: rgba(255, 255, 255, 0.82);
  background: rgba(0, 0, 0, 0.56);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  pointer-events: none;
}

#weather-panel {
  position: fixed;
  right: 12px;
  top: 228px;
  z-index: 2300;
  width: 300px;
  background: rgba(8, 12, 20, 0.86);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 10px;
  padding: 12px;
  color: #f6f8fc;
  backdrop-filter: blur(6px);
  display: none;
}

#weather-panel .close {
  position: absolute;
  top: 8px;
  right: 10px;
  border: none;
  background: none;
  color: rgba(255, 255, 255, 0.7);
  font-size: 16px;
  cursor: pointer;
  line-height: 1;
}

#weather-panel .close:hover {
  color: #ffffff;
}

#weather-panel .loc {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.78);
  margin-bottom: 6px;
}

#weather-panel .temp {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 4px;
}

#weather-panel .cond {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.84);
  margin-bottom: 8px;
}

#weather-panel .row {
  display: flex;
  justify-content: space-between;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  padding: 4px 0;
  font-size: 13px;
}

#weather-panel .k {
  color: rgba(255, 255, 255, 0.62);
}
</style>
</head>
<body>
<div id="map"></div>
<div id="clock"></div>
<div id="radar-time"></div>
<div id="hint">NWS Radar loaded from NOAA map services. Click map for NWS point forecast.</div>

<div id="controls">
  <div class="title">NWS Radar Controls</div>
  <div class="row">
    <label for="display-mode">Display Mode</label>
    <select id="display-mode">
      <option value="radar">Radar Reflectivity</option>
      <option value="ptype">Precip Type (Forecast)</option>
    </select>
  </div>
  <div class="row">
    <label for="radar-opacity">Radar Opacity</label>
    <input id="radar-opacity" type="range" min="0" max="100" value="62" />
  </div>
  <div id="status"></div>
</div>

<div id="weather-panel">
  <button class="close" id="wp-close" aria-label="Close weather panel">&#x2715;</button>
  <div class="loc" id="wp-loc"></div>
  <div class="temp" id="wp-temp">--</div>
  <div class="cond" id="wp-cond">Click map for point forecast</div>
  <div class="row"><span class="k">Forecast</span><span id="wp-short">--</span></div>
  <div class="row"><span class="k">Precip Chance</span><span id="wp-pop">--</span></div>
  <div class="row"><span class="k">Wind</span><span id="wp-wind">--</span></div>
  <div class="row"><span class="k">Updated</span><span id="wp-updated">--</span></div>
</div>

<script>
const map = L.map("map", {
  center: [39.5, -98.35],
  zoom: 5,
  maxZoom: 12,
  zoomControl: false,
  attributionControl: false
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  maxZoom: 18
}).addTo(map);

const RADAR_WMS = "https://mapservices.weather.noaa.gov/eventdriven/services/radar/radar_base_reflectivity/MapServer/WMSServer";
const RADAR_LAYER_NAME = "1";
const NOWCOAST_WMS = "https://nowcoast.noaa.gov/geoserver/ows";
const PTYPE_RAIN_LAYER = "ndfd_precipitation:conus_6hr_precipitation_amount";
const PTYPE_SNOW_LAYER = "ndfd_precipitation:conus_6hr_snow_amount";
const DEFAULT_SETTINGS_TOKEN = "v1_eyJhZ2VuZGEiOnsiaWQiOiJuYXRpb25hbCIsImNlbnRlciI6Wy04OC44OTMsNDEuMTIyXSwibG9jYXRpb24iOm51bGwsInpvb20iOjQuOTMyMDQ2Njk5Nzc2Njc1LCJsYXllciI6InBjcG5fdHlwIn0sImFuaW1hdGluZyI6ZmFsc2UsImJhc2UiOiJkYXJrY2FudmFzIiwiYXJ0Y2MiOmZhbHNlLCJjb3VudHkiOnRydWUsImN3YSI6dHJ1ZSwicmZjIjpmYWxzZSwic3RhdGUiOnRydWUsIm1lbnUiOnRydWUsInNob3J0RnVzZWRPbmx5Ijp0cnVlLCJvcGFjaXR5Ijp7ImFsZXJ0cyI6MC44LCJsb2NhbCI6MC42LCJsb2NhbFN0YXRpb25zIjowLjgsIm5hdGlvbmFsIjowLjZ9fQ";
const RADAR_REFRESH_MS = 5 * 60 * 1000;

const statusEl = document.getElementById("status");
const radarTimeEl = document.getElementById("radar-time");
const opacityInput = document.getElementById("radar-opacity");
const closeWeatherBtn = document.getElementById("wp-close");
const weatherPanelEl = document.getElementById("weather-panel");
const displayModeEl = document.getElementById("display-mode");

let radarLayer = L.tileLayer.wms(RADAR_WMS, {
  layers: RADAR_LAYER_NAME,
  format: "image/png",
  transparent: true,
  opacity: 0.62,
  version: "1.3.0",
  zIndex: 1000
}).addTo(map);

let ptypeRainLayer = L.tileLayer.wms(NOWCOAST_WMS, {
  layers: PTYPE_RAIN_LAYER,
  format: "image/png",
  transparent: true,
  opacity: 0.62,
  version: "1.3.0",
  zIndex: 1000
});

let ptypeSnowLayer = L.tileLayer.wms(NOWCOAST_WMS, {
  layers: PTYPE_SNOW_LAYER,
  format: "image/png",
  transparent: true,
  opacity: 0.62,
  version: "1.3.0",
  zIndex: 1001
});

let clickMarker = null;
let activeForecastController = null;
let activeRequestId = 0;
let activeMode = "radar";

const pointsCache = new Map();
const forecastCache = new Map();

function cacheKeyForLatLon(lat, lon) {
  // Round to reduce repeated requests on nearby clicks in the same NWS grid cell.
  return lat.toFixed(2) + "," + lon.toFixed(2);
}

function setWeatherLoading(lat, lon) {
  weatherPanelEl.style.display = "block";
  document.getElementById("wp-loc").textContent = lat.toFixed(3) + ", " + lon.toFixed(3);
  document.getElementById("wp-temp").textContent = "--";
  document.getElementById("wp-cond").textContent = "Loading NWS forecast...";
  document.getElementById("wp-short").textContent = "--";
  document.getElementById("wp-pop").textContent = "--";
  document.getElementById("wp-wind").textContent = "--";
  document.getElementById("wp-updated").textContent = "--";
}

function drawClickMarker(lat, lon) {
  if (clickMarker) map.removeLayer(clickMarker);
  clickMarker = L.circleMarker([lat, lon], {
    radius: 7,
    color: "#ffffff",
    weight: 2,
    fillColor: "#1f7cff",
    fillOpacity: 0.9
  }).addTo(map);
}

function setStatus(message, isError) {
  statusEl.textContent = message;
  statusEl.style.color = isError ? "#ffb4b4" : "#bdf7c5";
}

function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent = now.toLocaleTimeString("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    timeZoneName: "short"
  });
}

function refreshRadar() {
  const stamp = Date.now();
  if (activeMode === "radar") {
    radarLayer.setParams({ _: stamp });
  } else {
    ptypeRainLayer.setParams({ _: stamp });
    ptypeSnowLayer.setParams({ _: stamp });
  }
  const now = new Date();
  const label = activeMode === "radar" ? "NWS Radar Updated: " : "NWS Precip Type Updated: ";
  radarTimeEl.textContent = label + now.toLocaleTimeString("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

function applyDisplayMode(mode) {
  activeMode = mode;
  map.removeLayer(radarLayer);
  map.removeLayer(ptypeRainLayer);
  map.removeLayer(ptypeSnowLayer);

  if (mode === "ptype") {
    ptypeRainLayer.addTo(map);
    ptypeSnowLayer.addTo(map);
    setStatus("Precip Type mode", false);
  } else {
    radarLayer.addTo(map);
    setStatus("Radar reflectivity mode", false);
  }

  refreshRadar();
}

function decodeSettingsToken(token) {
  if (!token || token.indexOf("v1_") !== 0) return null;
  const encoded = token.slice(3).replace(/-/g, "+").replace(/_/g, "/");
  const padded = encoded + "=".repeat((4 - (encoded.length % 4)) % 4);
  try {
    const json = atob(padded);
    return JSON.parse(json);
  } catch (e) {
    return null;
  }
}

function applySettingsToken(token) {
  const settings = decodeSettingsToken(token);
  if (!settings) return;

  const agenda = settings.agenda || {};
  const center = agenda.center;
  const zoom = agenda.zoom;
  if (Array.isArray(center) && center.length === 2) {
    const lon = Number(center[0]);
    const lat = Number(center[1]);
    if (Number.isFinite(lat) && Number.isFinite(lon)) {
      map.setView([lat, lon], Number.isFinite(zoom) ? zoom : map.getZoom());
    }
  }

  const opacity = settings.opacity || {};
  const localOpacity = Number(opacity.local);
  if (Number.isFinite(localOpacity)) {
    const sliderValue = Math.max(0, Math.min(100, Math.round(localOpacity * 100)));
    opacityInput.value = String(sliderValue);
    const layerOpacity = sliderValue / 100;
    radarLayer.setOpacity(layerOpacity);
    ptypeRainLayer.setOpacity(layerOpacity);
    ptypeSnowLayer.setOpacity(layerOpacity);
  }

  const layer = agenda.layer;
  if (layer === "pcpn_typ") {
    displayModeEl.value = "ptype";
    applyDisplayMode("ptype");
  } else {
    displayModeEl.value = "radar";
    applyDisplayMode("radar");
  }
}

radarLayer.on("loading", function() {
  setStatus("Loading NWS radar tiles...", false);
});

radarLayer.on("load", function() {
  setStatus("", false);
});

radarLayer.on("tileerror", function() {
  setStatus("Radar tile failed to load from NOAA service", true);
});

opacityInput.addEventListener("input", function() {
  const value = Number(opacityInput.value) / 100;
  radarLayer.setOpacity(value);
  ptypeRainLayer.setOpacity(value);
  ptypeSnowLayer.setOpacity(value);
});

displayModeEl.addEventListener("change", function() {
  applyDisplayMode(displayModeEl.value);
});

async function fetchNwsPointForecast(lat, lon) {
  const requestId = ++activeRequestId;

  if (activeForecastController) {
    activeForecastController.abort();
  }
  activeForecastController = new AbortController();

  setWeatherLoading(lat, lon);
  drawClickMarker(lat, lon);

  try {
    const key = cacheKeyForLatLon(lat, lon);
    let pointsMeta = pointsCache.get(key);

    if (!pointsMeta) {
      const pUrl = "https://api.weather.gov/points/" + lat.toFixed(4) + "," + lon.toFixed(4);
      const pointsRes = await fetch(pUrl, { signal: activeForecastController.signal });
      if (!pointsRes.ok) throw new Error("Points HTTP " + pointsRes.status);

      const pointsData = await pointsRes.json();
      const props = pointsData.properties || {};
      const forecastUrl = props.forecastHourly || props.forecast;
      if (!forecastUrl) throw new Error("No forecast URL in points response");

      pointsMeta = {
        forecastUrl: forecastUrl,
        city: props.relativeLocation && props.relativeLocation.properties && props.relativeLocation.properties.city,
        state: props.relativeLocation && props.relativeLocation.properties && props.relativeLocation.properties.state
      };
      pointsCache.set(key, pointsMeta);
    }

    let forecastData = forecastCache.get(pointsMeta.forecastUrl);
    if (!forecastData) {
      const forecastRes = await fetch(pointsMeta.forecastUrl, { signal: activeForecastController.signal });
      if (!forecastRes.ok) throw new Error("Forecast HTTP " + forecastRes.status);
      forecastData = await forecastRes.json();
      forecastCache.set(pointsMeta.forecastUrl, forecastData);
    }

    if (requestId !== activeRequestId) {
      return;
    }

    const period = forecastData.properties && forecastData.properties.periods && forecastData.properties.periods[0];
    if (!period) throw new Error("No forecast period available");

    const city = pointsMeta.city;
    const state = pointsMeta.state;
    const locText = (city && state) ? (city + ", " + state) : (lat.toFixed(3) + ", " + lon.toFixed(3));

    weatherPanelEl.style.display = "block";
    document.getElementById("wp-loc").textContent = locText;
    document.getElementById("wp-temp").textContent = period.temperature + " " + period.temperatureUnit;
    document.getElementById("wp-cond").textContent = period.detailedForecast || period.shortForecast || "Forecast unavailable";
    document.getElementById("wp-short").textContent = period.shortForecast || "--";

    const pop = period.probabilityOfPrecipitation && period.probabilityOfPrecipitation.value;
    document.getElementById("wp-pop").textContent = (pop == null ? "--" : pop + "%");

    const wind = (period.windSpeed || "") + " " + (period.windDirection || "");
    document.getElementById("wp-wind").textContent = wind.trim() || "--";
    document.getElementById("wp-updated").textContent = new Date().toLocaleTimeString("en-US", {
      hour: "2-digit",
      minute: "2-digit",
      second: "2-digit"
    });

    setStatus("Loaded NWS point forecast", false);
  } catch (err) {
    if (err && err.name === "AbortError") {
      return;
    }
    setStatus("NWS forecast request failed", true);
    document.getElementById("wp-cond").textContent = "Failed to load forecast";
  } finally {
    if (requestId === activeRequestId) {
      activeForecastController = null;
    }
  }
}

map.on("click", function(e) {
  fetchNwsPointForecast(e.latlng.lat, e.latlng.lng);
  document.getElementById("hint").style.display = "none";
});

closeWeatherBtn.addEventListener("click", function() {
  document.getElementById("weather-panel").style.display = "none";
  if (clickMarker) {
    map.removeLayer(clickMarker);
    clickMarker = null;
  }
});

updateClock();
setInterval(updateClock, 1000);
applySettingsToken(DEFAULT_SETTINGS_TOKEN);
refreshRadar();
setInterval(refreshRadar, RADAR_REFRESH_MS);
</script>
</body>
</html>
