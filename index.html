<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RainViewer Radar Controls</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0f1116;
  font-family: "Segoe UI", Tahoma, sans-serif;
}

#map {
  width: 100vw;
  height: 100vh;
}

.leaflet-control-attribution,
.leaflet-control-zoom {
  display: none;
}

#clock {
  position: fixed;
  bottom: 12px;
  left: 12px;
  z-index: 2200;
  color: #fff;
  background: rgba(0, 0, 0, 0.62);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 34px;
  font-family: monospace;
  pointer-events: none;
}

#updated {
  position: fixed;
  bottom: 74px;
  left: 12px;
  z-index: 2200;
  color: #f2f2f2;
  background: rgba(0, 0, 0, 0.45);
  border-radius: 6px;
  padding: 6px 10px;
  font-family: monospace;
  font-size: 14px;
  pointer-events: none;
}

#controls {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 2300;
  width: 320px;
  background: rgba(8, 12, 20, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 10px;
  padding: 12px;
  color: #f6f8fc;
  backdrop-filter: blur(6px);
}

#controls .title {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 6px;
}

#controls .row {
  margin-top: 9px;
}

#controls label {
  display: block;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.84);
  margin-bottom: 4px;
}

#controls select,
#controls input[type="range"] {
  width: 100%;
  box-sizing: border-box;
}

#controls select {
  background: rgba(255, 255, 255, 0.08);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 8px;
  padding: 7px 9px;
}

#status {
  margin-top: 8px;
  min-height: 16px;
  font-size: 12px;
  color: #bdf7c5;
}

#hint {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2200;
  color: rgba(255, 255, 255, 0.82);
  background: rgba(0, 0, 0, 0.56);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  pointer-events: none;
}

#weather-panel {
  position: fixed;
  right: 12px;
  top: 188px;
  z-index: 2300;
  width: 300px;
  background: rgba(8, 12, 20, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 10px;
  padding: 12px;
  color: #f6f8fc;
  backdrop-filter: blur(6px);
  display: none;
}

#weather-panel .close {
  position: absolute;
  top: 8px;
  right: 10px;
  border: none;
  background: none;
  color: rgba(255, 255, 255, 0.7);
  font-size: 16px;
  cursor: pointer;
}

#weather-panel .close:hover {
  color: #fff;
}

#weather-panel .loc {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.82);
  margin-bottom: 6px;
}

#weather-panel .temp {
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 4px;
}

#weather-panel .cond {
  font-size: 13px;
  margin-bottom: 8px;
}

#weather-panel .row {
  display: flex;
  justify-content: space-between;
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  padding: 4px 0;
  font-size: 13px;
}

#weather-panel .k {
  color: rgba(255, 255, 255, 0.62);
}

#scale-panel {
  position: fixed;
  right: 12px;
  bottom: 12px;
  z-index: 2300;
  width: 300px;
  background: rgba(8, 12, 20, 0.9);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 10px;
  padding: 10px 12px;
  color: #f6f8fc;
  backdrop-filter: blur(6px);
}

#scale-panel .title {
  font-size: 12px;
  color: rgba(255, 255, 255, 0.86);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

#scale-panel .bar {
  width: 100%;
  height: 12px;
  border-radius: 6px;
  border: 1px solid rgba(255, 255, 255, 0.22);
  margin-bottom: 4px;
}

#scale-panel .labels {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.75);
}

#scale-panel .stack {
  display: grid;
  gap: 8px;
}

#scale-panel .item .item-title {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.8);
  margin-bottom: 3px;
}
</style>
</head>
<body>
<div id="map"></div>
<div id="clock"></div>
<div id="updated"></div>
<div id="hint">Use Product to switch between Radar, Satellite, Temperature, and Everything.</div>

<div id="controls">
  <div class="title">RainViewer Product Options</div>

  <div class="row">
    <label for="product-mode">Product</label>
    <select id="product-mode">
      <option value="radar">Radar</option>
      <option value="satellite">Satellite</option>
      <option value="temperature">Temperature</option>
      <option value="everything">Everything</option>
    </select>
  </div>

  <div class="row">
    <label for="opacity">Opacity</label>
    <input id="opacity" type="range" min="0" max="100" value="62" />
  </div>

  <div id="status"></div>
</div>

<div id="weather-panel">
  <button class="close" id="wp-close" aria-label="Close weather panel">&#x2715;</button>
  <div class="loc" id="wp-loc"></div>
  <div class="temp" id="wp-temp">--</div>
  <div class="cond" id="wp-cond">Click map for current conditions</div>
  <div class="row"><span class="k">Feels Like</span><span id="wp-feels">--</span></div>
  <div class="row"><span class="k">Humidity</span><span id="wp-humidity">--</span></div>
  <div class="row"><span class="k">Wind</span><span id="wp-wind">--</span></div>
  <div class="row"><span class="k">Precip</span><span id="wp-precip">--</span></div>
</div>

<div id="scale-panel">
  <div class="title" id="scale-title">Scale</div>
  <div id="scale-content"></div>
</div>

<script>
const map = L.map("map", {
  center: [41.122, -88.893],
  zoom: 5,
  maxZoom: 12,
  zoomControl: false,
  attributionControl: false
});

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  maxZoom: 18
}).addTo(map);

const productModeEl = document.getElementById("product-mode");
const opacityEl = document.getElementById("opacity");
const statusEl = document.getElementById("status");
const updatedEl = document.getElementById("updated");
const weatherPanelEl = document.getElementById("weather-panel");
const closeWeatherBtn = document.getElementById("wp-close");
const scaleTitleEl = document.getElementById("scale-title");
const scaleContentEl = document.getElementById("scale-content");

let radarLayer = null;
let satelliteLayer = null;
let satelliteLayerExtra = null;
let temperatureLayer = null;
let latestMapData = null;
let lastRainviewLoadedAt = null;
let activeProduct = "radar";
let clickMarker = null;
const REFRESH_MS = 60 * 1000;

const NOWCOAST_WMS = "https://nowcoast.noaa.gov/geoserver/ows";
const CONUS_TEMP_LAYER = "ndfd_temperature:conus_air_temperature";
const GOES_SAT_IR_LAYER = "satellite:goes_longwave_imagery";
const DEFAULT_OPACITY = 0.62;
const DEFAULT_FRAME_SOURCE = "latest_any";
const DEFAULT_RADAR_CONFIG = { color: 2, smooth: 1, snow: 1 };
let currentOpacity = DEFAULT_OPACITY;

const WMO_TEXT = {
  0: "Clear sky", 1: "Mainly clear", 2: "Partly cloudy", 3: "Overcast",
  45: "Fog", 48: "Icy fog", 51: "Light drizzle", 53: "Drizzle", 55: "Dense drizzle",
  61: "Light rain", 63: "Rain", 65: "Heavy rain", 66: "Freezing rain", 67: "Heavy freezing rain",
  71: "Light snow", 73: "Snow", 75: "Heavy snow", 77: "Snow grains",
  80: "Rain showers", 81: "Rain showers", 82: "Heavy showers",
  85: "Snow showers", 86: "Heavy snow showers", 95: "Thunderstorm"
};

function setStatus(msg, isError) {
  statusEl.textContent = msg;
  statusEl.style.color = isError ? "#ffb4b4" : "#bdf7c5";
}

function setUpdatedText(sourceLabel, sourceDate) {
  const checked = new Date().toLocaleTimeString("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  if (sourceDate instanceof Date && !Number.isNaN(sourceDate.getTime())) {
    updatedEl.textContent =
      sourceLabel + ": " + sourceDate.toLocaleTimeString("en-US", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }) + " | Checked: " + checked;
    return;
  }

  updatedEl.textContent = sourceLabel + " | Checked: " + checked;
}

function setSingleScale(title, gradient, labels) {
  scaleTitleEl.textContent = title;
  scaleContentEl.innerHTML =
    '<div class="bar" style="background:' + gradient + ';"></div>' +
    '<div class="labels"><span>' + labels[0] + '</span><span>' + labels[1] + '</span><span>' + labels[2] + '</span></div>';
}

function setStackedScale() {
  scaleTitleEl.textContent = "Scale: Everything";
  scaleContentEl.innerHTML =
    '<div class="stack">' +
      '<div class="item">' +
        '<div class="item-title">Radar (dBZ)</div>' +
        '<div class="bar" style="background: linear-gradient(90deg, #1dd1ff 0%, #39d353 35%, #f0c83c 60%, #f97316 78%, #ef4444 100%);"></div>' +
        '<div class="labels"><span>Light</span><span>Moderate</span><span>Heavy</span></div>' +
      '</div>' +
      '<div class="item">' +
        '<div class="item-title">Satellite Brightness</div>' +
        '<div class="bar" style="background: linear-gradient(90deg, #111827 0%, #6b7280 50%, #f9fafb 100%);"></div>' +
        '<div class="labels"><span>Cold Cloud Tops</span><span></span><span>Warmer</span></div>' +
      '</div>' +
      '<div class="item">' +
        '<div class="item-title">Temperature (°F)</div>' +
        '<div class="bar" style="background: linear-gradient(90deg, #2563eb 0%, #06b6d4 30%, #22c55e 50%, #eab308 72%, #ef4444 100%);"></div>' +
        '<div class="labels"><span>20</span><span>60</span><span>100</span></div>' +
      '</div>' +
    '</div>';
}

function updateScale(product) {
  if (product === "satellite") {
    setSingleScale(
      "Scale: Satellite Brightness",
      "linear-gradient(90deg, #111827 0%, #6b7280 50%, #f9fafb 100%)",
      ["Cold Cloud Tops", "", "Warmer"]
    );
    return;
  }
  if (product === "temperature") {
    setSingleScale(
      "Scale: Temperature (°F)",
      "linear-gradient(90deg, #2563eb 0%, #06b6d4 30%, #22c55e 50%, #eab308 72%, #ef4444 100%)",
      ["20", "60", "100"]
    );
    return;
  }
  if (product === "everything") {
    setStackedScale();
    return;
  }
  setSingleScale(
    "Scale: Radar Reflectivity (dBZ)",
    "linear-gradient(90deg, #1dd1ff 0%, #39d353 35%, #f0c83c 60%, #f97316 78%, #ef4444 100%)",
    ["Light", "Moderate", "Heavy"]
  );
}

function windDir(deg) {
  const dirs = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
  if (!Number.isFinite(deg)) return "--";
  return dirs[Math.round(deg / 45) % 8];
}

function showWeatherLoading(lat, lon) {
  weatherPanelEl.style.display = "block";
  document.getElementById("wp-loc").textContent = lat.toFixed(3) + ", " + lon.toFixed(3);
  document.getElementById("wp-temp").textContent = "--";
  document.getElementById("wp-cond").textContent = "Loading...";
  document.getElementById("wp-feels").textContent = "--";
  document.getElementById("wp-humidity").textContent = "--";
  document.getElementById("wp-wind").textContent = "--";
  document.getElementById("wp-precip").textContent = "--";
}

function drawClickMarker(lat, lon) {
  if (clickMarker) map.removeLayer(clickMarker);
  clickMarker = L.circleMarker([lat, lon], {
    radius: 6,
    color: "#fff",
    weight: 2,
    fillColor: "#4fa9ff",
    fillOpacity: 0.9
  }).addTo(map);
}

async function fetchCurrentConditions(lat, lon) {
  showWeatherLoading(lat, lon);
  drawClickMarker(lat, lon);

  const url = new URL("https://api.open-meteo.com/v1/forecast");
  url.searchParams.set("latitude", lat.toFixed(4));
  url.searchParams.set("longitude", lon.toFixed(4));
  url.searchParams.set("current", "temperature_2m,apparent_temperature,weather_code,relative_humidity_2m,wind_speed_10m,wind_direction_10m,precipitation");
  url.searchParams.set("temperature_unit", "fahrenheit");
  url.searchParams.set("wind_speed_unit", "mph");
  url.searchParams.set("precipitation_unit", "inch");
  url.searchParams.set("timezone", "auto");

  try {
    const res = await fetch(url.toString());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const c = data.current || {};

    document.getElementById("wp-temp").textContent = Math.round(c.temperature_2m) + " F";
    document.getElementById("wp-cond").textContent = WMO_TEXT[c.weather_code] || "Current conditions";
    document.getElementById("wp-feels").textContent = Math.round(c.apparent_temperature) + " F";
    document.getElementById("wp-humidity").textContent = (c.relative_humidity_2m ?? "--") + "%";
    document.getElementById("wp-wind").textContent = Math.round(c.wind_speed_10m || 0) + " mph " + windDir(c.wind_direction_10m);
    document.getElementById("wp-precip").textContent = (c.precipitation ?? 0) + '"';
    setStatus("Loaded current conditions", false);
  } catch (e) {
    document.getElementById("wp-cond").textContent = "Failed to load current conditions";
    setStatus("Current conditions request failed", true);
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent = now.toLocaleTimeString("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    timeZoneName: "short"
  });
}

function pickFrame(data) {
  const source = DEFAULT_FRAME_SOURCE;
  const past = (data.radar && data.radar.past) || [];
  const nowcast = (data.radar && data.radar.nowcast) || [];

  if (source === "latest_past") {
    return past.length ? past[past.length - 1] : null;
  }
  if (source === "latest_nowcast") {
    return nowcast.length ? nowcast[nowcast.length - 1] : null;
  }

  const merged = nowcast.concat(past);
  return merged.length ? merged[merged.length - 1] : null;
}

function pickSatelliteFrame(data) {
  const frames = (data.satellite && data.satellite.infrared) || [];
  return frames.length ? frames[frames.length - 1] : null;
}

function pickFallbackRadarFrame(data) {
  const past = (data.radar && data.radar.past) || [];
  return past.length ? past[past.length - 1] : null;
}

function buildRadarUrl(data, frame, config) {
  const host = data.host || "https://tilecache.rainviewer.com";
  const size = window.devicePixelRatio >= 2 ? 512 : 256;
  const color = config.color;
  const smooth = config.smooth;
  const snow = config.snow;
  return host + frame.path + "/" + size + "/{z}/{x}/{y}/" + color + "/" + smooth + "_" + snow + ".png";
}

function buildSatelliteUrl(data, frame) {
  const host = data.host || "https://tilecache.rainviewer.com";
  const size = window.devicePixelRatio >= 2 ? 512 : 256;
  return host + frame.path + "/" + size + "/{z}/{x}/{y}/0/0_0.png";
}

function removeAllOverlays() {
  if (radarLayer) {
    map.removeLayer(radarLayer);
    radarLayer = null;
  }
  if (satelliteLayer) {
    map.removeLayer(satelliteLayer);
    satelliteLayer = null;
  }
  if (satelliteLayerExtra) {
    map.removeLayer(satelliteLayerExtra);
    satelliteLayerExtra = null;
  }
  if (temperatureLayer) {
    map.removeLayer(temperatureLayer);
    temperatureLayer = null;
  }
}

function addTemperatureLayer(opacity) {
  temperatureLayer = L.tileLayer.wms(NOWCOAST_WMS, {
    layers: CONUS_TEMP_LAYER,
    format: "image/png",
    transparent: true,
    opacity: opacity,
    version: "1.3.0",
    zIndex: 1002
  }).addTo(map);
}

function renderRadar() {
  if (!latestMapData) return;
  updateScale(activeProduct);
  removeAllOverlays();

  const tileSize = window.devicePixelRatio >= 2 ? 512 : 256;
  const layerOpacity = currentOpacity;
  const radarFrame = pickFrame(latestMapData);
  const fallbackRadarFrame = pickFallbackRadarFrame(latestMapData);

  if (activeProduct === "temperature") {
    addTemperatureLayer(layerOpacity);
    setUpdatedText("Temperature layer active", null);
    setStatus("Loaded Temperature", false);
    return;
  }

  if (activeProduct === "satellite") {
    satelliteLayer = L.tileLayer.wms(NOWCOAST_WMS, {
      layers: GOES_SAT_IR_LAYER,
      format: "image/png",
      transparent: true,
      opacity: layerOpacity,
      version: "1.3.0",
      zIndex: 1001
    }).addTo(map);

    setUpdatedText("Satellite Updated", new Date());
    setStatus("Loaded Satellite (GOES IR)", false);
    return;
  }

  if (!radarFrame) {
    if (fallbackRadarFrame) {
      const fallbackUrl = buildRadarUrl(latestMapData, fallbackRadarFrame, DEFAULT_RADAR_CONFIG);
      radarLayer = L.tileLayer(fallbackUrl, {
        tileSize: tileSize,
        opacity: layerOpacity,
        maxNativeZoom: 7,
        maxZoom: 12,
        zIndex: 1000
      }).addTo(map);
      setUpdatedText("Fallback Radar Frame", new Date(fallbackRadarFrame.time * 1000));
      setStatus("Source had no frame. Using fallback latest past frame.", true);
      return;
    }
    setStatus("No radar frame available for selected source", true);
    return;
  }

  const radarConfig = DEFAULT_RADAR_CONFIG;
  const radarUrl = buildRadarUrl(latestMapData, radarFrame, radarConfig);
  radarLayer = L.tileLayer(radarUrl, {
    tileSize: tileSize,
    opacity: layerOpacity,
    maxNativeZoom: 7,
    maxZoom: 12,
    zIndex: 1000
  }).addTo(map);

  if (activeProduct === "everything") {
    satelliteLayer = L.tileLayer.wms(NOWCOAST_WMS, {
      layers: GOES_SAT_IR_LAYER,
      format: "image/png",
      transparent: true,
      opacity: Math.max(0.2, layerOpacity * 0.45),
      version: "1.3.0",
      zIndex: 1001
    }).addTo(map);
    addTemperatureLayer(Math.max(0.2, layerOpacity * 0.55));
  }

  const loadedAt = lastRainviewLoadedAt || new Date();
  updatedEl.textContent = "Rainview last time loaded " + loadedAt.toLocaleTimeString("en-US", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });

  if (activeProduct === "everything") {
    setStatus("Loaded Everything (Radar + Satellite + Temperature)", false);
  } else {
    setStatus("Loaded Radar", false);
  }
}

async function loadRainViewerData() {
  try {
    setStatus("Loading RainViewer data...", false);
    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    if (!res.ok) throw new Error("HTTP " + res.status);

    latestMapData = await res.json();
    lastRainviewLoadedAt = new Date();
    renderRadar();
  } catch (e) {
    setStatus("Failed to load RainViewer maps", true);
  }
}

productModeEl.addEventListener("change", function() {
  activeProduct = productModeEl.value;
  renderRadar();
});

opacityEl.addEventListener("input", function() {
  currentOpacity = Number(opacityEl.value) / 100;
  if (radarLayer) radarLayer.setOpacity(currentOpacity);
  if (satelliteLayer) {
    const satOpacity = activeProduct === "everything" ? Math.max(0.2, currentOpacity * 0.45) : currentOpacity;
    satelliteLayer.setOpacity(satOpacity);
  }
  if (temperatureLayer) {
    const tempOpacity = activeProduct === "everything" ? Math.max(0.2, currentOpacity * 0.55) : currentOpacity;
    temperatureLayer.setOpacity(tempOpacity);
  }
});

map.on("click", function(e) {
  fetchCurrentConditions(e.latlng.lat, e.latlng.lng);
});

closeWeatherBtn.addEventListener("click", function() {
  weatherPanelEl.style.display = "none";
  if (clickMarker) {
    map.removeLayer(clickMarker);
    clickMarker = null;
  }
});

updateClock();
setInterval(updateClock, 1000);
updateScale(activeProduct);
loadRainViewerData();
setInterval(loadRainViewerData, REFRESH_MS);
</script>
</body>
</html>
