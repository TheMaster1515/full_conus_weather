<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>US Radar Wall - Live Only</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden;
}

#map { width: 100vw; height: 100vh; transform: scale(1.05); transform-origin: center center; }

.leaflet-control-attribution, .leaflet-control-zoom { display: none; }

#clock {
  position: fixed; bottom: 12px; left: 12px; color: white; font-family: monospace; font-size: 40px;
  background: rgba(0,0,0,0.6); padding: 10px 16px; border-radius: 8px; z-index: 2000;
  pointer-events: none; text-shadow: 1px 1px 2px black;
}

#radar-updated {
  position: fixed; bottom: 80px; left: 12px; color: white; font-family: monospace; font-size: 18px;
  background: rgba(0,0,0,0.6); padding: 6px 10px; border-radius: 6px; z-index: 2000;
  pointer-events: none; text-shadow: 1px 1px 2px black;
}

#zoom-buttons {
  position: fixed; bottom: 12px; right: 12px; z-index: 2000;
}

#zoom-buttons button {
  font-size: 24px; margin: 2px; padding: 8px 12px; border-radius: 6px; border: none;
  background: rgba(0,0,0,0.6); color: white; cursor: pointer;
}
#zoom-buttons button:hover { background: rgba(255,255,255,0.2); }

</style>
</head>

<body>
<div id="map"></div>
<div id="clock"></div>
<div id="radar-updated"></div>
<div id="zoom-buttons">
  <button onclick="zoomIn()">+</button>
  <button onclick="zoomOut()">-</button>
</div>

<script>
// Initialize map
const map = L.map("map", { center:[39.5,-98.35], zoom:5, zoomControl:false, attributionControl:false });

// Dark base map
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", { maxZoom:18 }).addTo(map);

let radarLayer = null;

// Function to load the absolute latest radar frame
async function loadRadar() {
  try {
    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data = await res.json();

    // Combine nowcast and past frames
    const frames = (data.radar.nowcast || []).concat(data.radar.past || []);
    if (!frames.length) return;

    // Always pick the frame with the highest timestamp
    const latest = frames.reduce((a,b) => a.time > b.time ? a : b);

    // Remove old radar if exists
    if (radarLayer) map.removeLayer(radarLayer);

    radarLayer = L.tileLayer(
      `https://tilecache.rainviewer.com/v2/radar/${latest.time}/256/{z}/{x}/{y}/2/1_1.png`,
      { opacity:0.75, zIndex:1000 }
    ).addTo(map);

    // Show last updated timestamp
    const frameTime = new Date(latest.time * 1000);
    document.getElementById("radar-updated").textContent =
      `Radar Updated: ${frameTime.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;

  } catch(e) {
    console.error("Failed to load radar:", e);
  }
}

// Load radar immediately and refresh every 30 seconds
loadRadar();
setInterval(loadRadar, 30 * 1000);

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZoneName:"short"});
}
updateClock();
setInterval(updateClock, 1000);

// Zoom
function zoomIn(){ map.zoomIn(); }
function zoomOut(){ map.zoomOut(); }

</script>
</body>
</html>
