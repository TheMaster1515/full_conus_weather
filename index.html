<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Full Conus Live Radar</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; background: black; overflow: hidden;
}

#map { width: 100vw; height: 100vh; transform: scale(1.05); transform-origin: center center; }

.leaflet-control-attribution, .leaflet-control-zoom { display: none; }

#clock {
  position: fixed; bottom: 12px; left: 12px; color: white; font-family: monospace; font-size: 40px;
  background: rgba(0,0,0,0.6); padding: 10px 16px; border-radius: 8px; z-index: 2000;
  pointer-events: none; text-shadow: 1px 1px 2px black;
}

#radar-updated {
  position: fixed; bottom: 80px; left: 12px; color: white; font-family: monospace; font-size: 18px;
  background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 6px; z-index: 2000;
  pointer-events: none; text-shadow: 1px 1px 2px black;
}

#zoom-buttons {
  position: fixed; bottom: 12px; right: 12px; z-index: 2000;
}

#zoom-buttons button {
  font-size: 24px; margin: 2px; padding: 8px 12px; border-radius: 6px; border: none;
  background: rgba(0,0,0,0.6); color: white; cursor: pointer;
}
#zoom-buttons button:hover { background: rgba(255,255,255,0.2); }
</style>
</head>

<body>
<div id="map"></div>
<div id="radar-updated"></div>
<div id="clock"></div>
<div id="zoom-buttons">
  <button onclick="zoomIn()">+</button>
  <button onclick="zoomOut()">-</button>
</div>

<script>
const map = L.map("map", { center:[39.5,-98.35], zoom:5, zoomControl:false, attributionControl:false });

// Dark base map
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", { maxZoom:18 }).addTo(map);

window.radarLayer = null;

// RainViewer tile styling (source palette)
// We recolor tiles client-side to enforce rain/snow colors.
const RADAR_COLOR_SCHEME = 2;
const RADAR_SMOOTH = 1;
const RADAR_SNOW_COLORS = 1;

function clamp01(v) {
  return Math.max(0, Math.min(1, v));
}

function mix(a, b, t) {
  return Math.round(a + (b - a) * t);
}

function rainRamp(t) {
  // Green -> Yellow -> Orange -> Red for rain intensity.
  if (t < 0.33) {
    const p = t / 0.33;
    return [mix(40, 160, p), mix(200, 220, p), mix(40, 40, p)];
  }
  if (t < 0.66) {
    const p = (t - 0.33) / 0.33;
    return [mix(160, 255, p), mix(220, 180, p), mix(40, 0, p)];
  }
  const p = (t - 0.66) / 0.34;
  return [mix(255, 210, p), mix(180, 40, p), mix(0, 0, p)];
}

function snowRamp(t) {
  // Light blue -> deep blue for snow intensity.
  return [mix(130, 10, t), mix(200, 80, t), mix(255, 255, t)];
}

function recolorRadarTile(imageData) {
  const px = imageData.data;

  for (let i = 0; i < px.length; i += 4) {
    const r = px[i];
    const g = px[i + 1];
    const b = px[i + 2];
    const a = px[i + 3];

    if (a === 0) continue;

    const max = Math.max(r, g, b);
    const min = Math.min(r, g, b);
    const delta = max - min;
    const sat = max === 0 ? 0 : delta / max;
    const brightness = (r + g + b) / (3 * 255);

    let hue = 0;
    if (delta !== 0) {
      if (max === r) hue = 60 * (((g - b) / delta) % 6);
      else if (max === g) hue = 60 * (((b - r) / delta) + 2);
      else hue = 60 * (((r - g) / delta) + 4);
      if (hue < 0) hue += 360;
    }

    // Strongly blue hues are treated as snow when snow overlay is enabled.
    const isSnow = RADAR_SNOW_COLORS === 1 && sat > 0.35 && hue >= 220 && hue <= 260;

    // Darker source pixels generally indicate stronger returns.
    const intensity = clamp01((1 - brightness) * 1.25 + (a / 255) * 0.15);
    const [nr, ng, nb] = isSnow ? snowRamp(intensity) : rainRamp(intensity);

    px[i] = nr;
    px[i + 1] = ng;
    px[i + 2] = nb;
    px[i + 3] = Math.min(255, Math.round(a * 1.1));
  }

  return imageData;
}

function createStyledRadarLayer(tileUrl) {
  return L.gridLayer({
    tileSize: 256,
    opacity: 0.72,
    zIndex: 1000,
    updateWhenZooming: false,
    updateWhenIdle: true,
    createTile(coords, done) {
      const tileSrc = L.Util.template(tileUrl, coords);
      const canvas = L.DomUtil.create("canvas", "leaflet-tile");
      canvas.width = 256;
      canvas.height = 256;

      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      if (!ctx) {
        const imgFallback = L.DomUtil.create("img", "leaflet-tile");
        imgFallback.alt = "";
        imgFallback.setAttribute("role", "presentation");
        imgFallback.width = 256;
        imgFallback.height = 256;
        imgFallback.crossOrigin = "anonymous";
        imgFallback.onload = () => done(null, imgFallback);
        imgFallback.onerror = () => done(null, imgFallback);
        imgFallback.src = tileSrc;
        return imgFallback;
      }

      const img = new Image();
      img.crossOrigin = "anonymous";

      img.onload = () => {
        try {
          ctx.drawImage(img, 0, 0, 256, 256);
          const data = ctx.getImageData(0, 0, 256, 256);
          recolorRadarTile(data);
          ctx.putImageData(data, 0, 0);
          done(null, canvas);
        } catch (err) {
          // If recolor is blocked or fails, show original colors instead of blank tiles.
          try {
            ctx.clearRect(0, 0, 256, 256);
            ctx.drawImage(img, 0, 0, 256, 256);
          } catch (_) {
            // Ignore fallback draw errors and still return tile to avoid hard failures.
          }
          done(null, canvas);
        }
      };

      img.onerror = () => {
        done(null, canvas);
      };

      img.src = tileSrc;
      return canvas;
    }
  });
}

// Load latest radar frame only
async function loadRadar() {
  try {
    const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
    const data = await res.json();

    // Use nowcast first, fallback to past
    let frames = (data.radar.nowcast || []).concat(data.radar.past || []);
    if (!frames.length) return;

    const latest = frames[frames.length - 1]; // newest frame
    const host = data.host || "https://tilecache.rainviewer.com";

    if (window.radarLayer) map.removeLayer(window.radarLayer);

    window.radarLayer = createStyledRadarLayer(
      `${host}${latest.path}/256/{z}/{x}/{y}/${RADAR_COLOR_SCHEME}/${RADAR_SMOOTH}_${RADAR_SNOW_COLORS}.png`
    ).addTo(map);

    // Display radar update time, capped at current local time
    const now = new Date();
    let frameTime = new Date(latest.time * 1000);
    if (frameTime > now) frameTime = now;

    document.getElementById("radar-updated").textContent =
      `Radar Updated: ${frameTime.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;

  } catch(e) {
    console.error("Failed to load radar:", e);
  }
}

// Initial load + refresh every 30s for near real-time
loadRadar();
setInterval(loadRadar, 30 * 1000);

// Live clock
function updateClock(){
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZoneName:"short"});
}
updateClock();
setInterval(updateClock, 1000);

// Zoom buttons
function zoomIn(){ map.zoomIn(); }
function zoomOut(){ map.zoomOut(); }
</script>
</body>
</html>
